version: "3.9"

services:

  # ── Vector Database ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: nutrition_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (queue + cache) ────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nutrition_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Application ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: nutrition_api
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    environment:
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: nutrition_worker
    env_file:
      - config/.env
    environment:
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: celery -A workers.tasks.celery_app worker --loglevel=info --concurrency=8
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

  # ── Celery Flower (monitoring) ───────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: nutrition_flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
